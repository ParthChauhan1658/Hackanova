version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: sentinel_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: sentinel_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: netrika2026
      POSTGRES_DB: netrika
    restart: unless-stopped
    volumes:
      - sentinel_pg_data:/var/lib/postgresql/data

volumes:
  sentinel_pg_data:
